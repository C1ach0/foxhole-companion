name: Companion Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: companion-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -ne "tag") {
            throw "Releases must be triggered from a Git tag."
          }

          if ($env:GITHUB_REF_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use the vX.Y.Z format."
          }

          $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
          $packageVersion = node -p "require('./package.json').version"

          if ($tagVersion -ne $packageVersion) {
            throw "Tag version '$tagVersion' does not match package.json version '$packageVersion'."
          }

          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "The tagged commit must be part of the origin/main history."
          }

      - name: Generate release config
        shell: pwsh
        env:
          FOXPILE_GAME_PROCESS: ${{ secrets.FOXPILE_GAME_PROCESS }}
          FOXPILE_API_URL: ${{ secrets.FOXPILE_API_URL }}
          FOXPILE_COMPANION_ID: ${{ secrets.FOXPILE_COMPANION_ID }}
          FOXPILE_COMPANION_SECRET: ${{ secrets.FOXPILE_COMPANION_SECRET }}
          FOXPILE_COMPANION_SKEW_MS: ${{ secrets.FOXPILE_COMPANION_SKEW_MS }}
        run: |
          $required = @(
            "FOXPILE_API_URL",
            "FOXPILE_COMPANION_ID",
            "FOXPILE_COMPANION_SECRET"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Required release secret '$name' is missing."
            }
          }

          @'
          const fs = require("node:fs");

          const values = {
            FOXPILE_GAME_PROCESS: process.env.FOXPILE_GAME_PROCESS || "",
            FOXPILE_API_URL: process.env.FOXPILE_API_URL || "",
            FOXPILE_COMPANION_ID: process.env.FOXPILE_COMPANION_ID || "",
            FOXPILE_COMPANION_SECRET: process.env.FOXPILE_COMPANION_SECRET || "",
            FOXPILE_COMPANION_SKEW_MS: process.env.FOXPILE_COMPANION_SKEW_MS || "",
          };

          const content = Object.entries(values)
            .map(([key, value]) => `export const ${key} = ${JSON.stringify(value)};`)
            .join("\n");

          fs.writeFileSync("src/core/generated-config.ts", content + "\n");
          '@ | node

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }

      - name: Build installer
        run: npm run build:windows

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: foxpile-companion-windows-${{ github.ref_name }}
          path: dist/installer/Foxpile Companion Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $installer = (Resolve-Path "dist/installer/Foxpile Companion Setup.exe").Path

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer --clobber
          } else {
            gh release create $tag $installer `
              --verify-tag `
              --generate-notes `
              --title "Foxpile Companion $tag"
          }
